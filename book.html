<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Book a Free Call — Flower Bloom Studios</title>
<meta name="description" content="Book a free web design consultation call with Flower Bloom Studios. Pick a time that works for you.">
<link rel="icon" href="images/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-dark:#0D1F13; --bg-darker:#0A180F;
    --green:#2FBF71; --green-light:#7FE0A8;
    --cream:#F4F1EA; --ink:#0D1F13; --maxw:1180px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:Inter,system-ui,sans-serif;background:var(--cream);color:var(--ink);-webkit-font-smoothing:antialiased}
  a{color:var(--green);text-decoration:none}
  ::selection{background:var(--green);color:var(--bg-dark)}

  /* ============ Nav (always solid on this page) ============ */
  .nav{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--bg-dark);border-bottom:1px solid rgba(244,241,234,0.12)}
  .nav-inner{max-width:var(--maxw);margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px}
  .nav-logo{display:flex;align-items:center;gap:10px}
  .nav-logo img{height:36px;width:auto}
  .nav-logo span{font-family:Syne,sans-serif;font-weight:800;font-size:18px;color:var(--cream);letter-spacing:0.01em}
  .nav-links{display:flex;align-items:center;gap:30px}
  .nav-links a{font-weight:500;font-size:16px;color:var(--cream)}
  .nav-links a:not(.btn):hover{color:var(--green-light)}
  .nav-links a.active{color:var(--green-light);border-bottom:2px solid var(--green);padding-bottom:2px}
  .nav-links .btn-quote{font-weight:600;color:var(--bg-dark);background:var(--green);padding:10px 20px;border-radius:10px}
  .nav-links .btn-quote:hover{background:var(--green-light);color:var(--bg-dark)}
  .nav-toggle{display:none;flex-direction:column;justify-content:center;gap:5px;width:44px;height:44px;background:none;border:0;cursor:pointer;padding:8px}
  .nav-toggle span{display:block;height:2px;width:100%;background:var(--cream);border-radius:2px;transition:transform .3s,opacity .3s}
  .nav-toggle.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
  .nav-toggle.open span:nth-child(2){opacity:0}
  .nav-toggle.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

  /* ============ Booking area (fills screen below nav) ============ */
  .book-main{margin-top:66px;height:calc(100vh - 66px)}
  #my-cal-inline-web-design-appointment-call{width:100%;height:100%;overflow:scroll}

  @media (max-width:880px){
    .nav-toggle{display:flex}
    .nav-links{position:absolute;top:100%;left:0;right:0;flex-direction:column;align-items:stretch;gap:0;background:var(--bg-dark);border-bottom:1px solid rgba(244,241,234,0.12);padding:8px 24px 20px;transform:translateY(-8px);opacity:0;visibility:hidden;transition:opacity .25s,transform .25s,visibility .25s;box-shadow:0 20px 40px rgba(0,0,0,0.35)}
    .nav-links.open{opacity:1;visibility:visible;transform:translateY(0)}
    .nav-links a{padding:14px 4px;border-bottom:1px solid rgba(244,241,234,0.08);font-size:17px}
    .nav-links a.active{border-bottom:1px solid rgba(244,241,234,0.08);color:var(--green-light);padding-bottom:14px}
    .nav-links .btn-quote{margin-top:14px;padding:14px 20px;border-bottom:0;text-align:center}
  }
</style>
</head>
<body>

<!-- ============ NAV (header) ============ -->
<nav class="nav" id="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <img src="images/logo.png" alt="Flower Bloom Studios">
      <span>Flower Bloom Studios</span>
    </a>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <a href="portfolio.html">Work</a>
      <a href="index.html#services">Services</a>
      <a href="index.html#contact">Contact</a>
      <a href="book.html" class="active">Book</a>
      <a href="book.html" class="btn btn-quote">Book a Free Call</a>
    </div>
  </div>
</nav>

<!-- ============ BOOKING CALENDAR (only content) ============ -->
<main class="book-main">
  <div style="width:100%;height:100%;overflow:scroll" id="my-cal-inline-web-design-appointment-call"></div>
</main>

<!-- Cal.com inline booking embed -->
<script type="text/javascript">
  (function (C, A, L) { let p = function (a, ar) { a.q.push(ar); }; let d = C.document; C.Cal = C.Cal || function () { let cal = C.Cal; let ar = arguments; if (!cal.loaded) { cal.ns = {}; cal.q = cal.q || []; d.head.appendChild(d.createElement("script")).src = A; cal.loaded = true; } if (ar[0] === L) { const api = function () { p(api, arguments); }; const namespace = ar[1]; api.q = api.q || []; if(typeof namespace === "string"){cal.ns[namespace] = cal.ns[namespace] || api;p(cal.ns[namespace], ar);p(cal, ["initNamespace", namespace]);} else p(cal, ar); return;} p(cal, ar); }; })(window, "https://app.cal.com/embed/embed.js", "init");
  Cal("init", "web-design-appointment-call", {origin:"https://app.cal.com"});
  Cal.config = Cal.config || {};
  Cal.config.forwardQueryParams = true;
  Cal.ns["web-design-appointment-call"]("inline", {
    elementOrSelector:"#my-cal-inline-web-design-appointment-call",
    config: {"layout":"month_view","useSlotsViewOnSmallScreen":"true"},
    calLink: "reid.scott/web-design-appointment-call",
  });
  Cal.ns["web-design-appointment-call"]("ui", {"hideEventTypeDetails":false,"layout":"month_view"});
</script>

<script>
  // Mobile menu toggle
  var toggle = document.getElementById('navToggle');
  var links = document.getElementById('navLinks');
  toggle.addEventListener('click', function(){
    var open = links.classList.toggle('open');
    toggle.classList.toggle('open', open);
    toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
  });
  links.querySelectorAll('a').forEach(function(a){
    a.addEventListener('click', function(){
      links.classList.remove('open');
      toggle.classList.remove('open');
      toggle.setAttribute('aria-expanded','false');
    });
  });
</script>
</body>
</html>
